# Targeting segments (pipeline/segment.py). Coarse priority buckets used for
# reporting and the service floor. Edit freely — no code change needed.
#
# P1 = physical-product makers/traders · P2 = e-commerce · P3 = exporters/councils
# service = floored (not targeted) · competitor = freight forwarders (never a lead)

# What to do with service businesses: "floor" keeps them at a low score (visible
# but ignorable), "drop" removes them entirely. We floor by default so nothing is
# silently lost and the sheet still shows them as low-tier.
service_action: floor
service_floor: 20

# Businesses that do NOT ship physical goods — not our customers.
service_keywords:
  - marketing
  - advertising
  - digital agency
  - تسويق
  - دعاية
  - اعلان
  - accounting
  - محاسبة
  - software
  - برمجة
  - it solutions
  - information technology
  - تكنولوجيا المعلومات
  - consulting
  - consultancy
  - استشارات
  - clinic
  - عيادة
  - medical center
  - hospital
  - law firm
  - محاماة
  - محامي
  - human resources
  - recruitment
  - موارد بشرية
  - توظيف
  - training
  - تدريب
  - travel agency
  - سياحة
  - real estate
  - عقارات


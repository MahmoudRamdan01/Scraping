# Lead scoring — business-fit FIRST (sales team's 100/70/50/20 rule), then
# reachability bonuses. The sales manager can retune every number here without
# touching code. Presence of `base_bands` switches on the band engine.
#
#   ~100  factory / product-maker WITH selling website + online store + ships
#   ~70   importer or distributor (trader)
#   ~50   general trading company
#    20   service company (floored — not targeted)
#    10   freight forwarder (competitor — never a real lead)

max_score: 100

# Base score by business fit. Bonuses below push a lead UP toward max_score.
base_bands:
  product_maker: 62     # Manufacturer / Exporter
  trader: 52            # Importer / Distributor
  ecommerce: 60         # online stores ship constantly
  general_trading: 38   # generic Import & Export
  service: 20           # floored, flat
  competitor: 10        # freight forwarders, flat
  default: 32

# Reachability / qualification bonuses (added to the base, then clamped).
bonuses:
  has_website: 10
  has_online_store: 12
  ships: 8              # exports/non-local markets OR strong shipping intent
  has_phone: 6
  has_email: 5
  has_contact_person: 6 # a named export/logistics/owner contact
  has_linkedin: 4

# Minimum score for each tier (retuned so real leads separate instead of all
# clustering in one band).
tiers:
  Hot: 65
  Medium: 40
  Weak: 0

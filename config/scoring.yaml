# Transparent, tunable lead scoring. Sales manager can edit these weights
# without touching code. Score is clamped to max_score, then mapped to a tier.

max_score: 100
max_intent_points: 20   # how many points a high Shipping-Intent (0-100) can add

tiers:        # minimum score for each tier
  Hot: 61
  Medium: 31
  Weak: 0

# Simple presence-based points
weights:
  has_website: 10
  has_phone: 8
  has_email: 5
  has_linkedin: 5
  multiple_branches: 8
  has_online_store: 10
  in_freight_directory: 10   # high buying-intent for a shipping company

# Points by recency of last known activity (first matching bucket wins)
activity:
  - {max_months: 3, points: 15}
  - {max_months: 12, points: 8}
  - {max_months: 24, points: 3}

# Points by follower count (first matching bucket wins; only when data exists)
followers:
  - {min: 1000, points: 15}
  - {min: 500, points: 8}
  - {min: 100, points: 3}
  - {min: 0, points: 0}

# Sources/categories treated as high-intent freight signals
freight_sources: [freightclub, wsdconnect, forwarding_companies]
